name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestation for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'main.js'

      - name: Generate artifact attestation for styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'styles.css'

      - name: Generate artifact attestation for manifest.json
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'manifest.json'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            styles.css
            manifest.json
